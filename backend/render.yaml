services:
  - type: web
    name: paragi-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PERSISTENT_MEMORY
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        value: "*"
    disk:
      name: paragi-data
      mountPath: /opt/render/project/src/data
      sizeGB: 10
