services:
  - type: web
    name: paragi-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker api.server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PERSISTENT_MEMORY
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        value: "*" # Set this to your Vercel URL after deployment
    disk:
      name: paragi-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 10
