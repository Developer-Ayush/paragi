services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - paragi-data:/app/data
    environment:
      - PARAGI_DATA_DIR=/app/data
      - PARAGI_LLM_BACKEND=none # Default to none, user can override for Ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paragi-data:
