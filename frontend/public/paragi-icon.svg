<svg
  width="260"
  height="260"
  viewBox="20 35 240 240"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Paragi logo"
>
  <!-- Secondary edges -->
  <g stroke="#A07850" fill="none" stroke-linecap="round">
    <line x1="140" y1="62"  x2="220" y2="100" stroke-width=".9" opacity=".58"/>
    <line x1="220" y1="100" x2="235" y2="192" stroke-width="1" opacity=".58"/>
    <line x1="58"  y1="234" x2="45"  y2="145" stroke-width=".8" opacity=".52"/>
    <line x1="45"  y1="145" x2="140" y2="62"  stroke-width=".85" opacity=".52"/>
    <line x1="165" y1="252" x2="58"  y2="234" stroke-width=".7" opacity=".48"/>
    <line x1="235" y1="192" x2="165" y2="252" stroke-width=".75" opacity=".48"/>
  </g>

  <!-- Primary edges -->
  <g stroke="#C05530" fill="none" stroke-linecap="round">
    <line x1="138" y1="150" x2="140" y2="62"  stroke-width="2.5" opacity=".86"/>
    <line x1="138" y1="150" x2="220" y2="100" stroke-width="2.2" opacity=".86"/>
    <line x1="138" y1="150" x2="235" y2="192" stroke-width="2" opacity=".86"/>
    <line x1="138" y1="150" x2="165" y2="252" stroke-width="1.8" opacity=".86"/>
    <line x1="138" y1="150" x2="58"  y2="234" stroke-width="1.6" opacity=".86"/>
    <line x1="138" y1="150" x2="45"  y2="145" stroke-width="2.3" opacity=".86"/>
  </g>

  <!-- Outer nodes -->
  <g fill="#C0CFD8">
    <circle cx="140" cy="62"  r="9"/>
    <circle cx="220" cy="100" r="8"/>
    <circle cx="235" cy="192" r="10"/>
    <circle cx="165" cy="252" r="8"/>
    <circle cx="58"  cy="234" r="7"/>
    <circle cx="45"  cy="145" r="9"/>
  </g>

  <!-- Hub ring -->
  <circle
    cx="138"
    cy="150"
    r="23"
    fill="none"
    stroke="#C05530"
    stroke-width=".9"
  />

  <!-- Center hub -->
  <circle cx="138" cy="150" r="15" fill="#C05530"/>
  <circle cx="138" cy="150" r="6" fill="rgba(244,239,227,.32)"/>
</svg>